<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mr Roadworthy — Inspector Lookup</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#0797d3;--blue-dark:#0578aa;--blue-light:#cce9f7;--blue-pale:#e4f4fb;
  --near-black:#111111;--white:#ffffff;
  --page-bg:#d0dce8;--card-bg:#ffffff;
  --gray-100:#e8edf2;--gray-200:#d0d8e0;--gray-400:#7a8a9a;--gray-600:#4a5a6a;
  --amber:#e6920a;--amber-bg:#fff3cd;--amber-border:#f5c842;
  --green:#22c55e;--red:#ef4444;
  --radius:10px;--radius-sm:6px;
  --shadow:0 3px 16px rgba(0,0,0,0.13);--shadow-strong:0 4px 20px rgba(0,0,0,0.18);
}
body{font-family:'Open Sans',sans-serif;background:var(--page-bg);color:var(--near-black);min-height:100vh;font-size:15px;line-height:1.5}

/* HEADER */
header{background:var(--white);border-bottom:4px solid var(--blue);padding:0 28px;display:flex;align-items:center;gap:16px;height:72px;position:sticky;top:0;z-index:200;box-shadow:0 2px 16px rgba(0,0,0,0.14)}
.logo-img{height:64px;width:auto;object-fit:contain;flex-shrink:0}
.header-divider{width:1px;height:38px;background:var(--gray-200)}
.header-label{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;color:var(--gray-600);letter-spacing:1.1px;text-transform:uppercase}
#status-dot{margin-left:auto;font-size:12px;color:var(--gray-400);display:flex;align-items:center;gap:6px;white-space:nowrap}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;flex-shrink:0}
.loading-dot{background:var(--amber)}
.error-dot{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* LAYOUT */
.app{max-width:1480px;margin:0 auto;padding:24px 20px;display:grid;grid-template-columns:300px 1fr;gap:22px;align-items:start}
.filter-col{position:sticky;top:90px;display:flex;flex-direction:column;gap:14px}

/* PANEL */
.panel{background:var(--white);border-radius:var(--radius);border:1px solid var(--gray-200);overflow:hidden;box-shadow:var(--shadow)}
.panel-hdr{background:var(--blue);padding:11px 14px;font-family:'Montserrat',sans-serif;font-weight:700;font-size:11px;color:var(--white);letter-spacing:1.1px;text-transform:uppercase}
.panel-body{padding:14px;display:flex;flex-direction:column;gap:12px}

/* FORM FIELDS */
.field{display:flex;flex-direction:column;gap:5px}
label{font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;color:var(--gray-600);letter-spacing:.9px;text-transform:uppercase}
input[type=text],select{width:100%;padding:9px 11px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);font-family:'Open Sans',sans-serif;font-size:14px;color:var(--near-black);background:var(--white);outline:none;transition:border-color .14s}
input[type=text]:focus,select:focus{border-color:var(--blue)}
input[type=text]::placeholder{color:var(--gray-400)}
select:disabled{opacity:.5;cursor:not-allowed}
.field-hint{font-size:11.5px;color:var(--gray-400);margin-top:2px}

/* SUBURB TAG */
.suburb-tag{display:inline-flex;align-items:center;gap:6px;background:var(--blue-light);border:1.5px solid var(--blue);border-radius:20px;padding:5px 12px;font-size:13px;font-weight:600;color:var(--blue-dark)}
.suburb-tag .tag-icon{font-size:14px}

/* CERT BUTTONS */
.cert-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.cert-btn{padding:8px 4px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);background:var(--white);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;color:var(--gray-600);cursor:pointer;text-align:center;transition:all .13s;letter-spacing:.4px;text-transform:uppercase}
.cert-btn:hover{border-color:var(--blue);color:var(--blue)}
.cert-btn.active{background:var(--blue);border-color:var(--blue);color:var(--white)}

/* STATUS BOX */
.status-panel{background:var(--white);border-radius:var(--radius);border:1px solid var(--gray-200);padding:12px 14px;font-size:12.5px;color:var(--gray-600);box-shadow:var(--shadow)}
.status-panel.error{border-color:#fca5a5;background:#fff5f5;color:#b91c1c}
.spinner{width:14px;height:14px;border:2px solid var(--gray-200);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

/* RESULTS */
.results-col{}
.results-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap}
.results-title{font-family:'Montserrat',sans-serif;font-weight:800;font-size:24px;color:var(--near-black);line-height:1.1}
.results-sub{font-size:13px;color:var(--gray-600);margin-top:3px}
.count-badge{background:var(--blue);color:var(--white);border-radius:20px;padding:5px 16px;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;white-space:nowrap;flex-shrink:0}

/* CARDS GRID — 3 per row */
.cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}

/* CARD */
.card{background:var(--card-bg);border-radius:var(--radius);border:1px solid var(--gray-200);overflow:hidden;box-shadow:var(--shadow-strong);animation:fadeUp .22s ease both;display:flex;flex-direction:column}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.card-header{background:#1a1a2e;padding:14px 16px;border-bottom:3px solid var(--blue)}
.insp-name{font-family:'Montserrat',sans-serif;font-weight:800;font-size:17px;color:#fff;margin-bottom:2px}
.insp-loc{font-size:11px;color:var(--blue);font-weight:700;font-family:'Montserrat',sans-serif;text-transform:uppercase;letter-spacing:.7px}
.insp-dist{display:inline-block;margin-top:7px;background:rgba(7,151,211,.18);color:#7dd3f0;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;letter-spacing:.5px}

.card-alert{background:var(--amber-bg);border-left:4px solid var(--amber);border-bottom:1px solid var(--amber-border);padding:9px 13px;font-size:12.5px;font-weight:600;color:#7a4a00;display:flex;gap:7px;align-items:flex-start;line-height:1.4}
.alert-icon{width:18px;height:18px;border-radius:50%;background:var(--amber);color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}

.card-pricing{padding:15px 16px;flex:1;background:var(--white)}
.svc-tag{display:inline-block;background:var(--blue);color:#fff;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;letter-spacing:.9px;text-transform:uppercase;padding:3px 9px;border-radius:4px;margin-bottom:8px}
.price-main{font-family:'Montserrat',sans-serif;font-weight:800;font-size:26px;color:var(--near-black);line-height:1}
.price-cents{font-size:15px;font-weight:600;color:var(--gray-600)}
.price-notes{margin-top:8px;font-size:12.5px;color:var(--gray-600);line-height:1.5;border-top:1px dashed var(--gray-200);padding-top:8px}
.price-note-line{display:flex;align-items:flex-start;gap:5px;margin-bottom:3px}
.price-note-line::before{content:'·';color:var(--blue);font-weight:700;flex-shrink:0;margin-top:1px}
.no-price{color:var(--gray-400);font-size:13px;font-style:italic}

/* STATE BOXES */
.state-box{text-align:center;padding:60px 24px;background:var(--card-bg);border-radius:var(--radius);border:1px solid var(--gray-200);color:var(--gray-400);box-shadow:var(--shadow);grid-column:1/-1}
.state-icon{font-size:38px;margin-bottom:12px;display:block}
.state-box h3{font-family:'Montserrat',sans-serif;font-size:19px;font-weight:700;color:var(--gray-600);margin-bottom:6px}
.state-box p{font-size:14px;line-height:1.6;max-width:320px;margin:0 auto}
.big-spinner{width:34px;height:34px;border:3px solid var(--gray-200);border-top-color:var(--blue);border-radius:50%;animation:spin .65s linear infinite;margin:0 auto 14px}

/* SUBURB BUTTONS */
.suburb-btn-row{display:flex;flex-wrap:wrap;gap:6px}
.suburb-btn{padding:7px 13px;border:1.5px solid var(--gray-200);border-radius:20px;background:var(--white);font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;color:var(--gray-600);cursor:pointer;transition:all .13s;letter-spacing:.3px}
.suburb-btn:hover{border-color:var(--blue);color:var(--blue)}
.suburb-btn.active{background:var(--blue);border-color:var(--blue);color:var(--white)}

/* NEARBY SUBURB LABEL */
.suburb-nearby-label{width:100%;font-family:'Montserrat',sans-serif;font-size:9.5px;font-weight:700;color:var(--gray-400);letter-spacing:.8px;text-transform:uppercase;margin-top:4px;padding-top:6px;border-top:1px dashed var(--gray-200)}
.suburb-btn-near{border-style:dashed;color:var(--gray-400)}
.suburb-btn-near:hover{border-color:var(--blue);color:var(--blue);border-style:solid}
.suburb-btn-near.active{background:var(--blue);border-color:var(--blue);color:var(--white);border-style:solid}

/* VEHICLE BUTTONS */
.veh-btn-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.veh-btn-grid.locked{pointer-events:none;opacity:.45}
.veh-btn{padding:8px 6px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);background:var(--white);font-family:'Montserrat',sans-serif;font-size:10.5px;font-weight:700;color:var(--gray-600);cursor:pointer;text-align:center;transition:all .13s;letter-spacing:.3px;text-transform:uppercase;line-height:1.3}
.veh-btn:hover{border-color:var(--blue);color:var(--blue)}
.veh-btn.active{background:var(--blue);border-color:var(--blue);color:var(--white)}

/* REGION DIVIDER */
.region-divider{grid-column:1/-1;display:flex;align-items:center;gap:10px;margin:6px 0;color:var(--gray-600);font-size:11px;font-family:'Montserrat',sans-serif;font-weight:700;letter-spacing:.8px;text-transform:uppercase}
.region-divider::before,.region-divider::after{content:'';flex:1;height:2px;background:var(--gray-400)}

/* OUT-OF-REGION CARDS */
.card.out-region .card-header{background:var(--blue-pale);border-bottom-color:var(--blue-light)}
.card.out-region .insp-name{color:var(--blue-dark)}
.card.out-region .insp-loc{color:var(--blue)}
.card.out-region .insp-dist{background:rgba(7,151,211,.12);color:var(--blue-dark)}

/* HIDDEN */
.hidden{display:none!important}
</style>
</head>

        <div class="results-sub" id="results-sub">Enter a postcode and select a service type to find inspectors</div>
      </div>
      <span class="count-badge hidden" id="count-badge"></span>
    </div>
    <div class="cards-grid" id="cards-grid">
      <div class="state-box">
        <div class="big-spinner"></div>
        <h3>Loading data…</h3>
        <p>Fetching inspector and suburb data from Google Sheets</p>
      </div>
    </div>
  </section>

</div>

<script>
// ── SHEET URLs ────────────────────────────────────────────────────────────────
const URLS = {
  inspectors: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQR5pawUVmsRPk1jC8I7IrB9NKcLmViWF06ki_IcgWWEAZPr6XmaNyK6IZLweGw1JYm1UeYjcNo4xQs/pub?gid=375791987&single=true&output=csv',
  prices:     'https://docs.google.com/spreadsheets/d/e/2PACX-1vQR5pawUVmsRPk1jC8I7IrB9NKcLmViWF06ki_IcgWWEAZPr6XmaNyK6IZLweGw1JYm1UeYjcNo4xQs/pub?gid=1998044231&single=true&output=csv',
  services:   'https://docs.google.com/spreadsheets/d/e/2PACX-1vQR5pawUVmsRPk1jC8I7IrB9NKcLmViWF06ki_IcgWWEAZPr6XmaNyK6IZLweGw1JYm1UeYjcNo4xQs/pub?gid=521082667&single=true&output=csv',
  suburbs:    'https://docs.google.com/spreadsheets/d/e/2PACX-1vQR5pawUVmsRPk1jC8I7IrB9NKcLmViWF06ki_IcgWWEAZPr6XmaNyK6IZLweGw1JYm1UeYjcNo4xQs/pub?gid=792672572&single=true&output=csv',
};

const PROXIES = [
  u => u,
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
];

// ── STATE ─────────────────────────────────────────────────────────────────────
const S = {
  inspectors: [], prices: {}, services: {},
  subsByPostcode: {}, subCoords: {}, subRegionLookup: {}, allSuburbs: [],
  vehicleTypes: [],   // [{label, base, hasCert}] — built from prices sheet
  loaded: false,
  suburb: null, subRegion: null,
  subLat: null, subLng: null,
  vehicleBase: null, hasCert: false, cert: 'Safety',
};

// ── CSV PARSE ─────────────────────────────────────────────────────────────────
function parseCSV(text) {
  const rows = []; let cells = [], cur = '', q = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (c === '"') { if (q && text[i+1]==='"'){cur+='"';i++;} else q=!q; }
    else if (c===',' && !q){ cells.push(cur.trim()); cur=''; }
    else if ((c==='\n'||c==='\r') && !q){
      cells.push(cur.trim()); cur='';
      if (cells.some(x=>x)) rows.push([...cells]);
      cells=[];
      if (c==='\r'&&text[i+1]==='\n') i++;
    } else cur+=c;
  }
  if (cur||cells.length){cells.push(cur.trim());if(cells.some(x=>x))rows.push(cells);}
  return rows;
}

function toObjects(rows) {
  if (rows.length<2) return [];
  const h = rows[0].map(x=>x.trim());
  return rows.slice(1).map(r=>{const o={};h.forEach((k,i)=>o[k]=(r[i]||'').trim());return o;});
}

// ── FETCH WITH PROXY ──────────────────────────────────────────────────────────
async function fetchCSV(url) {
  for (const p of PROXIES) {
    try {
      const r = await fetch(p(url));
      if (!r.ok) continue;
      const t = await r.text();
      if (t.trim().length > 10) return t;
    } catch {}
  }
  throw new Error('Failed: '+url);
}

// ── LOAD DATA ─────────────────────────────────────────────────────────────────
async function loadAll() {
  const [iT, pT, sT, subT] = await Promise.all([
    fetchCSV(URLS.inspectors), fetchCSV(URLS.prices),
    fetchCSV(URLS.services),   fetchCSV(URLS.suburbs),
  ]);

  // Inspectors
  S.inspectors = toObjects(parseCSV(iT));

  // Prices keyed by Service_Key; also derive ordered vehicle type list for buttons
  const priceRows = toObjects(parseCSV(pT));
  priceRows.forEach(r => { S.prices[r['Service_Key']] = r; });

  // Build vehicle types in sheet order, deduped by Vehicle_Type
  const seenVT = new Set();
  const vtGroups = {}; // Vehicle_Type → [service keys]
  priceRows.forEach(r => {
    if (!r.Service_Key || !r.Vehicle_Type) return;
    if (!vtGroups[r.Vehicle_Type]) vtGroups[r.Vehicle_Type] = [];
    vtGroups[r.Vehicle_Type].push(r.Service_Key);
  });
  priceRows.forEach(r => {
    const vt = r.Vehicle_Type;
    if (!vt || seenVT.has(vt)) return;
    seenVT.add(vt);
    const keys = vtGroups[vt];
    const certKeys = keys.filter(k => /_safety$|_gas$|_both$/.test(k));
    if (certKeys.length) {
      // Cert-based type: base = common prefix (e.g. "caravan")
      const base = certKeys[0].replace(/_(?:safety|gas|both)$/, '');
      S.vehicleTypes.push({ label: vt, base, hasCert: true });
    } else {
      S.vehicleTypes.push({ label: vt, base: keys[0], hasCert: false });
    }
  });

  // Services — find row containing 'vehicles_rwc' as header
  const sRows = parseCSV(sT);
  const hIdx = sRows.findIndex(r => r.some(c => c.trim() === 'vehicles_rwc'));
  const sHdrs = (hIdx >= 0 ? sRows[hIdx] : sRows[0]).map(x=>x.trim());
  const dataRows = sRows.slice(hIdx >= 0 ? hIdx+1 : 1);
  dataRows.forEach(r => {
    const name = r[0]?.trim(); if (!name) return;
    const obj = {};
    sHdrs.forEach((h,i)=>{ if(h) obj[h] = r[i]?.trim().toUpperCase()==='TRUE'; });
    S.services[name] = obj;
  });

  // Suburbs — index by postcode, build coord lookup, and flat list for name search
  toObjects(parseCSV(subT)).forEach(r => {
    const pc = r.Postcode?.toString().trim();
    if (!pc) return;
    if (!S.subsByPostcode[pc]) S.subsByPostcode[pc] = [];
    S.subsByPostcode[pc].push(r);
    if (r.Suburb) {
      S.subCoords[r.Suburb.toLowerCase().trim()] = {lat:parseFloat(r.Lat), lng:parseFloat(r.Lng)};
      S.subRegionLookup[r.Suburb.toLowerCase().trim()] = r.Region || '';
      S.allSuburbs.push(r);
    }
  });

  S.loaded = true;
}

// ── HAVERSINE DISTANCE (km) ───────────────────────────────────────────────────
function dist(la1,lo1,la2,lo2) {
  const R=6371, toR=x=>x*Math.PI/180;
  const dLa=toR(la2-la1), dLo=toR(lo2-lo1);
  const a=Math.sin(dLa/2)**2+Math.cos(toR(la1))*Math.cos(toR(la2))*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ── ESC HTML ──────────────────────────────────────────────────────────────────
const esc = s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// ── FILTER LOGIC ──────────────────────────────────────────────────────────────
function canDo(name) {
  const svc = S.services[name]; if (!svc || !S.vehicleBase) return false;
  const b = S.vehicleBase;
  if (!S.hasCert) return !!svc[b];
  if (S.cert==='Both')   return !!svc[`${b}_both`];
  if (S.cert==='Safety') return !!(svc[`${b}_safety`]||svc[`${b}_both`]);
  if (S.cert==='Gas')    return !!(svc[`${b}_gas`]||svc[`${b}_both`]);
  return false;
}

function serviceKey() {
  if (!S.vehicleBase) return null;
  if (!S.hasCert) return S.vehicleBase;
  const m = {Safety:'safety', Gas:'gas', Both:'both'};
  return `${S.vehicleBase}_${m[S.cert]}`;
}

// ── SEARCH & RENDER ───────────────────────────────────────────────────────────
function search() {
  if (!S.suburb || !S.vehicleBase || !S.loaded) return;
  const coords = S.subCoords[S.suburb.toLowerCase()];
  if (!coords) return;

  const sorted = S.inspectors
    .filter(i => canDo(i.Inspector))
    .map(i => {
      const c2 = S.subCoords[(i.Base_Suburb||'').toLowerCase().trim()];
      return {...i, km: c2 ? dist(coords.lat,coords.lng,c2.lat,c2.lng) : null};
    })
    .sort((a,b)=>{
      if (a.km===null&&b.km===null) return 0;
      if (a.km===null) return 1; if (b.km===null) return -1;
      return a.km-b.km;
    });

  const sameRegion  = sorted.filter(i => (i.Region||'') === S.subRegion);
  const otherRegion = sorted.filter(i => (i.Region||'') !== S.subRegion);
  renderCards(sameRegion, otherRegion);
}

function renderCards(sameRegion, otherRegion) {
  const results = [...sameRegion, ...otherRegion];
  const grid = document.getElementById('cards-grid');
  const badge = document.getElementById('count-badge');
  const sKey = serviceKey();
  const price = sKey ? S.prices[sKey] : null;

  // Update header
  const activeBtn = document.querySelector('.veh-btn.active');
  const vLabel = activeBtn ? activeBtn.textContent : '';
  document.getElementById('results-title').textContent = vLabel + ' Inspectors';
  document.getElementById('results-sub').textContent =
    `Near ${S.suburb}${S.hasCert?' · '+S.cert+' certificate':''}`;

  if (!results.length) {
    grid.innerHTML = `<div class="state-box"><span class="state-icon">🤷</span><h3>No inspectors found</h3><p>No inspectors match this combination. Try a different service or area.</p></div>`;
    badge.classList.add('hidden'); return;
  }

  badge.textContent = `${results.length} inspector${results.length>1?'s':''} found`;
  badge.classList.remove('hidden');

  grid.innerHTML = '';
  let idx = 0;
  sameRegion.forEach(insp => grid.appendChild(makeCard(insp, price, idx++, false)));

  if (sameRegion.length && otherRegion.length) {
    const div = document.createElement('div');
    div.className = 'region-divider';
    div.textContent = 'Other regions';
    grid.appendChild(div);
  }

  otherRegion.forEach(insp => grid.appendChild(makeCard(insp, price, idx++, true)));
}

function makeCard(insp, price, i, outRegion=false) {
  const card = document.createElement('div');
  card.className = 'card' + (outRegion ? ' out-region' : '');
  card.style.animationDelay = `${i*55}ms`;

  const distStr = insp.km!=null ? `${insp.km.toFixed(1)} km away` : '';

  // Header
  let html = `<div class="card-header">
    <div class="insp-name">${esc(insp.Inspector)}</div>
    <div class="insp-loc">${esc(insp.Base_Suburb||'')}${insp.Region?' · '+esc(insp.Region):''}</div>
    ${distStr?`<div class="insp-dist">📍 ${esc(distStr)}</div>`:''}
  </div>`;

  // Special note (amber warning)
  if (insp.Special_Note?.trim()) {
    html += `<div class="card-alert">
      <div class="alert-icon">!</div>
      <span>${esc(insp.Special_Note.trim())}</span>
    </div>`;
  }

  // Pricing
  html += `<div class="card-pricing">`;
  if (price) {
    const certPart = price.Cert_Type && price.Cert_Type!=='-' ? ` · ${price.Cert_Type}` : '';
    const priceVal = String(price['Base_Price ($)']||'').replace(/^\$\s*/,'');
    html += `<div class="svc-tag">${esc(price.Vehicle_Type)}${esc(certPart)}</div>
      <div class="price-main">$${esc(priceVal)}<span class="price-cents"> inc. GST</span></div>`;
    const notes = price.Price_Notes?.trim();
    if (notes) {
      const lines = notes.split(';').map(l=>l.trim()).filter(Boolean);
      html += `<div class="price-notes">${lines.map(l=>`<div class="price-note-line">${esc(l)}</div>`).join('')}</div>`;
    }
  } else {
    html += `<div class="no-price">Contact for pricing</div>`;
  }
  html += `</div>`;

  card.innerHTML = html;
  return card;
}

// ── SUBURB HELPERS ────────────────────────────────────────────────────────────
function nearbySuburbs(lat, lng, excludeSet, limit=8) {
  return S.allSuburbs
    .filter(s => !excludeSet.has(s.Suburb))
    .map(s => ({...s, km: dist(lat, lng, parseFloat(s.Lat), parseFloat(s.Lng))}))
    .sort((a, b) => a.km - b.km)
    .slice(0, limit);
}

function renderSuburbBtns(exact, nearby, autoSelect) {
  const row = document.getElementById('suburb-btn-row');
  const subField = document.getElementById('suburb-field');
  document.getElementById('suburb-single').classList.add('hidden');

  let html = exact.map(m =>
    `<button class="suburb-btn" data-suburb="${esc(m.Suburb)}">${esc(m.Suburb)}</button>`
  ).join('');

  if (nearby.length) {
    html += `<div class="suburb-nearby-label">Nearby suburbs</div>`;
    html += nearby.map(m =>
      `<button class="suburb-btn suburb-btn-near" data-suburb="${esc(m.Suburb)}" title="${esc(m.Suburb + ', ' + m.Region + ' — ' + m.km.toFixed(1) + ' km away')}">${esc(m.Suburb)}</button>`
    ).join('');
  }

  row.innerHTML = html;
  row.querySelectorAll('.suburb-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      row.querySelectorAll('.suburb-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      setSuburb(this.dataset.suburb);
    });
  });
  subField.classList.remove('hidden');

  if (autoSelect) {
    const first = row.querySelector('.suburb-btn');
    if (first) { first.classList.add('active'); setSuburb(autoSelect); }
  }
}

// ── UI EVENT HANDLERS ─────────────────────────────────────────────────────────
function setSuburb(name) {
  S.suburb = name;
  const key = name.toLowerCase();
  const coords = S.subCoords[key];
  S.subLat = coords?.lat; S.subLng = coords?.lng;
  S.subRegion = S.subRegionLookup[key] || '';
  document.getElementById('veh-btn-grid').classList.remove('locked');
  if (S.vehicleBase) search();
}

// Postcode / Suburb search input
document.getElementById('postcode-input').addEventListener('input', function() {
  const val = this.value.trim();
  const hint = document.getElementById('postcode-hint');
  const subField = document.getElementById('suburb-field');
  const subSingle = document.getElementById('suburb-single');

  // Reset location + vehicle state
  subField.classList.add('hidden'); subSingle.classList.add('hidden');
  document.getElementById('veh-btn-grid').classList.add('locked');
  document.querySelectorAll('.veh-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('cert-field').classList.add('hidden');
  S.suburb = null; S.subRegion = null; S.vehicleBase = null; S.hasCert = false;

  if (!val) {
    hint.textContent = 'Enter a postcode or type a suburb name';
    document.getElementById('cards-grid').innerHTML = `<div class="state-box"><span class="state-icon">🔍</span><h3>Ready to search</h3><p>Enter a postcode (e.g. 4227) or start typing a suburb name (e.g. Varsity Lakes)</p></div>`;
    document.getElementById('count-badge').classList.add('hidden');
    return;
  }

  if (!S.loaded) { hint.textContent = 'Still loading data…'; return; }

  // ── POSTCODE MODE (exactly 4 digits) ──
  if (/^\d{4}$/.test(val)) {
    const exact = S.subsByPostcode[val] || [];
    if (!exact.length) { hint.textContent = '⚠ Postcode not found in SEQ database'; return; }
    hint.textContent = '';
    const centLat = exact.reduce((s, m) => s + parseFloat(m.Lat), 0) / exact.length;
    const centLng = exact.reduce((s, m) => s + parseFloat(m.Lng), 0) / exact.length;
    const exactNames = new Set(exact.map(m => m.Suburb));
    const nearby = nearbySuburbs(centLat, centLng, exactNames, 8);
    const autoSelect = exact.length === 1 ? exact[0].Suburb : null;
    renderSuburbBtns(exact, nearby, autoSelect);

  // ── SUBURB NAME MODE (≥2 chars, contains a letter) ──
  } else if (val.length >= 2 && /[a-zA-Z]/.test(val)) {
    const q = val.toLowerCase();
    const startsWith = S.allSuburbs.filter(s => s.Suburb.toLowerCase().startsWith(q));
    const contains   = S.allSuburbs.filter(s => !s.Suburb.toLowerCase().startsWith(q) && s.Suburb.toLowerCase().includes(q));
    const matches = [...startsWith, ...contains].slice(0, 12);
    if (!matches.length) { hint.textContent = '⚠ No suburbs found'; return; }
    hint.textContent = '';
    renderSuburbBtns(matches, [], null);

  // ── PARTIAL INPUT ──
  } else {
    hint.textContent = /^\d+$/.test(val) ? 'Keep typing — enter full 4-digit postcode' : '';
  }
});

// Vehicle buttons — built dynamically from prices sheet after data loads
function buildVehicleButtons() {
  const grid = document.getElementById('veh-btn-grid');
  grid.innerHTML = S.vehicleTypes.map(vt =>
    `<button class="veh-btn" data-base="${esc(vt.base)}" data-cert="${vt.hasCert}">${esc(vt.label)}</button>`
  ).join('');
  grid.querySelectorAll('.veh-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      grid.querySelectorAll('.veh-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      const certField = document.getElementById('cert-field');
      S.vehicleBase = this.dataset.base;
      S.hasCert = this.dataset.cert === 'true';
      certField.classList.toggle('hidden', !S.hasCert);
      search();
    });
  });
}

// Cert buttons
document.querySelectorAll('.cert-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.cert-btn').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    S.cert = this.dataset.cert;
    search();
  });
});

// ── INIT ──────────────────────────────────────────────────────────────────────
(async () => {
  const statusDot = document.querySelector('.live-dot');
  const statusText = document.getElementById('status-text');
  const statusPanel = document.getElementById('data-status-panel');

  try {
    await loadAll();
    buildVehicleButtons();  // render buttons from live prices data
    statusDot.classList.remove('loading-dot');
    statusText.textContent = `Live · ${new Date().toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'})}`;
    statusPanel.innerHTML = `✓ ${S.inspectors.length} inspectors, ${S.vehicleTypes.length} service types &amp; ${Object.keys(S.subCoords).length} suburbs loaded`;
    document.getElementById('cards-grid').innerHTML = `<div class="state-box"><span class="state-icon" style="color:var(--green)">✓</span><h3>Ready — ${S.inspectors.length} inspectors loaded</h3><p>Enter a postcode and select a service type to find the closest inspector</p></div>`;
  } catch (e) {
    statusDot.classList.add('error-dot'); statusDot.classList.remove('loading-dot');
    statusText.textContent = 'Load failed';
    statusPanel.className = 'status-panel error';
    statusPanel.textContent = '⚠ Could not load data — check internet connection and refresh';
    document.getElementById('cards-grid').innerHTML = `<div class="state-box"><span class="state-icon">⚠</span><h3>Failed to load</h3><p>Check your internet connection and refresh the page.<br><small style="color:#9ca3af">${e.message}</small></p></div>`;
  }
})();
</script>
</body>
</html>
